version: "3"
services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: localdb
      POSTGRES_DB: nakama
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.21.1
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama --name nakama1 \
          --database.address postgres:localdb@postgres:5432/nakama \
          --logger.level DEBUG \
          --session.token_expiry_sec 7200 \
          --runtime.path /nakama/data/modules \
          --socket.server_key defaultkey
    volumes:
      - ./modules:/nakama/data/modules
    ports:
      - "7349:7349"   # gRPC
      - "7350:7350"   # gRPC-Web / HTTP API
      - "7351:7351"   # Console
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: